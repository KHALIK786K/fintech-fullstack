# ============================================================
#  MYSQL PROFILE  (activate: --spring.profiles.active=mysql)
#  Assumes a DB named 'fintechbank' exists. See README for docker one-liner.
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/fintechbank?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

# Seed data only runs when you want it; here we keep it for first run.
spring.sql.init.mode=never
spring.h2.console.enabled=false
