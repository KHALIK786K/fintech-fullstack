# ============================================================
#  DEFAULT PROFILE — H2 in-memory (zero setup, instant run)
#  Run MySQL instead with:  --spring.profiles.active=mysql
# ============================================================
spring.application.name=fintech-bank

# ---- Datasource (H2) ----
spring.datasource.url=jdbc:h2:mem:fintechbank;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console at http://localhost:8080/h2-console (JDBC URL above)
spring.h2.console.enabled=true

# ---- JPA / Hibernate ----
# create-drop rebuilds the schema each run; DataSeeder (a CommandLineRunner) seeds sample rows.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# ---- JWT ----
# CHANGE THIS SECRET in any real deployment. Must be >= 32 bytes for HS256.
app.jwt.secret=change-me-to-a-long-random-secret-key-at-least-32-bytes-long!!
app.jwt.expiration-ms=3600000

# ---- Business rules ----
app.rtgs.min-amount=200000
app.fraud.daily-limit=1000000
app.fraud.duplicate-window-seconds=60
app.neft.batch-interval-ms=30000

# ---- Optional infra (OFF by default so the app boots with no Kafka/Redis) ----
app.kafka.enabled=false
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.properties.spring.json.trusted.packages=com.fintech.bank.kafka
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# Redis is auto-configured only if you enable usage; default points at localhost.
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ---- Swagger ----
springdoc.swagger-ui.path=/swagger-ui.html

# ---- Actuator ----
management.endpoints.web.exposure.include=health
